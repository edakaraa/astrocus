name: Weekly Reports Cron

on:
  schedule:
    # Mondays 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Invoke generate-weekly-reports
        env:
          SUPABASE_FUNCTIONS_URL: ${{ secrets.SUPABASE_FUNCTIONS_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SUPABASE_FUNCTIONS_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Skip: SUPABASE_FUNCTIONS_URL or CRON_SECRET not configured in repo secrets."
            exit 0
          fi
          curl -fsS -X POST "$SUPABASE_FUNCTIONS_URL" \
            -H "x-cron-secret: $CRON_SECRET" \
            -H "Content-Type: application/json"
